apiVersion: apps/v1
kind: Deployment

metadata:
  name: thinktech-frontend
  namespace: thinktech

spec:
  replicas: 2

  selector:
    matchLabels:
      app: thinktech-frontend

  template:
    metadata:
      labels:
        app: thinktech-frontend

    spec:
      containers:
      - name: frontend
        image: asia-south1-docker.pkg.dev/billmonitor/thinktech-images/thinktech-frontend:1.0.0

        imagePullPolicy: Always

        ports:
        - containerPort: 80
